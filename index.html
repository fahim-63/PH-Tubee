<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ph tube project works here</title>
    <!-- daisy Ul cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        .active {
            background: #FF1F3D;
            color: white;
        }
    </style>

</head>

<body>

    <header>
        <nav class="w-11/12 mx-auto flex justify-between p-5 border-b-2 border-[#17171720] items-center">
            <div>
                <img class="w-[120px]" src="./images/Logo.png" alt="This is logo picture">
            </div>
            <div class="sort">
                <label class="input">
                    <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                        <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none"
                            stroke="currentColor">
                            <circle cx="11" cy="11" r="8"></circle>
                            <path d="m21 21-4.3-4.3"></path>
                        </g>
                    </svg>
                    <input id="search-input" type="search" required placeholder="Search" />
                </label>
            </div>
            <div class="blogs">
                <button class="btn bg-[#FF1F3D] text-white">sort by view</button>
            </div>
        </nav>

        <nav id="category-container" class="flex p-5 justify-center gap-5">
            <div>
                <button id="btn-all" onclick="loadVideo()" class="btn btn-sm ">All</button>

            </div>
        </nav>

    </header>

    <section id="loader" class="text-center ph-10 hidden">
        <span class="loading loading-bars loading-xs"></span>
        <span class="loading loading-bars loading-sm"></span>
        <span class="loading loading-bars loading-md"></span>
        <span class="loading loading-bars loading-lg"></span>
        <span class="loading loading-bars loading-xl"></span>
    </section>

    <section class="w-11/12 mx-auto grid grid-cols-4 gap-6" id="video-container">

        <div class="col-span-full flex flex-col py-20 items-center justify-center">
            <img src="./images/Icon.png" alt="Drawing picture">
            <h2 class="text-3xl font-bold">Oops!!Sorry,There is no content here.</h2>
        </div>
    </section>
    <!-- Open the modal using ID.showModal() method -->

    <dialog id="video_details" class="modal">
        <div class="modal-box">
            <div id="details-container">

            </div>
            <div class="modal-action">
                <form method="dialog">
                    <!-- if there is a button in form, it will close the modal -->
                    <button class="btn">Close</button>
                </form>
            </div>
        </div>
    </dialog>


    <script src="js/app.js"></script>
</body>

</html>
